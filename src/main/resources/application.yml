spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finances_db
    username: dev_user
    password: dev_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate # NUNCA use 'update' ou 'create' com Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  security:
    jwt:
      secret: my-super-secret-key-my-super-secret-key

  app:
    security-mode: VULNERABLE